summary: The dart CLI is on PATH for the workshop user

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  # Flutter ships a `dart` wrapper at $SDK/bin (alongside flutter) as well
  # as the real binary under bin/cache/dart-sdk/bin; setup-base puts
  # $SDK/bin first on PATH, so `command -v` resolves the wrapper. Either
  # location ends in /bin/dart, so match that suffix.
  workshop exec -- bash -lc 'command -v dart' | MATCH '/bin/dart$'

debug: |
  workshop exec -- bash -lc 'echo "$PATH"' || true
  workshop exec -- bash -lc 'dart --version' || true

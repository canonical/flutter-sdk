# Doubles as a regression test for a setup-project hook bug where the
# launch aborts on Permission denied copying
# /var/cache/flutter-sdk/artifacts/material_fonts/codepoints — the file
# ships mode 0640 (root:root) and the workshop user can't read it.
summary: Launch a workshop with the flutter SDK

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  # `workshop launch` is a blocking, fail-fast call: if it returned 0 in
  # prepare, the workshop is fully provisioned with our SDK applied
  # (including check-health reporting okay). As a belt-and-braces sanity
  # check, prove the workshop is interactable.
  workshop exec -- true

debug: |
  workshop tasks

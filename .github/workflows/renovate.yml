name: Renovate

on:
  workflow_dispatch:
  schedule:
    # Every day at 05:00 UTC.
    - cron: "0 5 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    uses: canonical/sdkcraft-actions/.github/workflows/renovate.yml@main
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
